<!-- layouts/events/create.html -->
{{ define "main" }}
  <div class="max-w-xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Create Event</h1>
    <form id="createForm" class="space-y-4">
      <div>
        <label class="block font-medium">Sponsor Name</label>
        <input name="sponsor" type="text" required
               class="w-full border rounded p-2" />
      </div>
      <div>
        <label class="block font-medium">Contact Email</label>
        <input name="email" type="email" required
               class="w-full border rounded p-2" />
      </div>
      <div>
        <label class="block font-medium">Contact Phone</label>
        <input name="phone" type="tel" required
               class="w-full border rounded p-2" />
      </div>
      <div>
        <label class="block font-medium">Event Name</label>
        <input name="name" type="text" required
               class="w-full border rounded p-2" />
      </div>
      <div>
        <label class="block font-medium">Event Date</label>
        <input name="date" type="date" required
               class="w-full border rounded p-2" />
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block font-medium">Street Address</label>
          <input name="street" type="text" required
                 class="w-full border rounded p-2" />
        </div>
        <div>
          <label class="block font-medium">City</label>
          <input name="city" type="text" required
                 class="w-full border rounded p-2" />
        </div>
        <div>
          <label class="block font-medium">State</label>
          <input name="state" type="text" required
                 class="w-full border rounded p-2" />
        </div>
        <div>
          <label class="block font-medium">ZIP Code</label>
          <input name="zip" type="text" required pattern="\d{5}(-\d{4})?"
                 class="w-full border rounded p-2" />
        </div>
      </div>
      <div>
        <label class="block font-medium">Flyer (PDF)</label>
        <input name="file" type="file" accept="application/pdf" required
               class="w-full" />
      </div>
      <button type="submit"
              class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        Submit Event
      </button>
      <p id="formMsg" class="mt-2 text-sm"></p>
    </form>
  </div>
  <script src="{{ "js/event-create.js" | relURL }}"></script>
{{ end }}
